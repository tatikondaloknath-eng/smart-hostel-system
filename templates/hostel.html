<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Hostel Accommodation System</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f5f7; margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; color: #333; }
        .page-container { display: none; background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); width: 100%; max-width: 900px; margin: auto; box-sizing: border-box; }
        .active-page { display: block; }
        .title { color: #a31d33; font-size: 26px; font-weight: bold; margin-bottom: 20px; margin-top: 30px; text-align: center; }
        .btn { padding: 12px 24px; font-size: 16px; border-radius: 6px; cursor: pointer; border: none; font-weight: bold; transition: 0.2s; background-color: #a31d33; color: white; margin-top: 10px; }
        .btn:hover { background-color: #8a182b; }
        .btn-outline { background-color: white; color: #a31d33; border: 2px solid #a31d33; }
        .btn-outline:hover { background-color: #fcebeb; }
        .btn-back { background: #6c757d; color: white; padding: 10px 20px; border-radius: 6px; border: none; cursor: pointer; font-weight: bold; }
        .header-buttons { position: absolute; top: 20px; right: 20px; display: flex; gap: 10px; z-index: 10; }
        .page-container { position: relative; } 
        .input-group { margin-bottom: 15px; text-align: left; }
        .input-group label { display: block; font-size: 14px; margin-bottom: 5px; font-weight: bold; color: #4a4a4a;}
        .input-group input, .input-group select { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 15px;}
        .room-grid { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 15px; }
        .room-tag { padding: 8px 12px; background: #eee; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 13px; border: 1px solid #ddd; }
        .room-tag:hover { background: #a31d33; color: white; }
        .floor-plan-wrapper { width: 100%; overflow-x: auto; padding: 10px 0; text-align: center; }
        .floor-plan { width: 600px; height: 350px; border: 6px solid #4a4a4a; margin: 10px auto; position: relative; background: #fafafa; display: inline-block; text-align: left; }
        .bed { position: absolute; width: 70px; height: 110px; background: #e0e0e0; border: 2px solid #ccc; border-radius: 8px; display: flex; flex-direction: column; justify-content: center; align-items: center; font-size: 10px; text-align: center; font-weight: bold; }
        .pillow { position: absolute; top: 8px; width: 40px; height: 20px; background: white; border: 1px solid #ccc; border-radius: 4px; }
        .bed-available { background: #d4edda; border-color: #28a745; color: #155724; }
        .bed-waiting { background: #fff3cd; border-color: #fd7e14; color: #856404; }
        .bed-booked { background: #f8d7da; border-color: #dc3545; color: #721c24; }
        .pos-1 { top: 20px; left: 20px; } .pos-2 { top: 20px; right: 20px; } .pos-3 { bottom: 20px; left: 20px; } .pos-4 { bottom: 20px; right: 20px; } 
        .table-responsive { width: 100%; overflow-x: auto; margin-top: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 13px; text-align: left; }
        th, td { border: 1px solid #ddd; padding: 8px; } th { background-color: #a31d33; color: white; }
        .modal { display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.6); align-items: center; justify-content: center; }
        .modal-content { background: white; padding: 30px; border-radius: 10px; width: 350px; position: relative; }
    </style>
</head>
<body>

    <div id="view-home" class="page-container active-page" style="text-align: center; max-width: 500px;">
        <div class="title"><i class="fas fa-building-columns"></i> Smart Hostel System</div>
        <button class="btn" style="width: 100%; margin-bottom: 15px;" onclick="goToView('view-login')">Student Portal</button>
        <button class="btn btn-outline" style="width: 100%;" onclick="goToView('view-admin-login')">Admin Portal</button>
    </div>

    <div id="view-admin" class="page-container" style="max-width: 1000px;">
        <div class="header-buttons"><button class="btn-back" onclick="goToView('view-home')">Logout</button></div>
        <div class="title">Hostel Management Dashboard</div>

        <div style="background: #fff; border: 2px solid #a31d33; padding: 20px; border-radius: 10px; margin-bottom: 25px;">
            <h4 style="margin:0 0 10px 0; color:#a31d33;"><i class="fas fa-eye"></i> Live Room Inspector</h4>
            <p style="font-size:12px; color:#666;">Select a Room Number below to see real-time bed occupancy.</p>
            <div class="room-grid" id="admin-room-selector">
                </div>
            <div id="admin-live-map" style="display:none; margin-top: 20px; border-top: 1px solid #eee; padding-top:15px;">
                <h5 id="inspect-title" style="text-align:center; margin-bottom:10px;"></h5>
                <div class="floor-plan-wrapper">
                    <div class="floor-plan">
                        <div id="admin-bed-1" class="bed pos-1"></div><div id="admin-bed-2" class="bed pos-2"></div>
                        <div id="admin-bed-3" class="bed pos-3"></div><div id="admin-bed-4" class="bed pos-4"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="input-group">
            <label><i class="fas fa-search"></i> Search Students</label>
            <input type="text" id="admin-search-input" onkeyup="filterAdminTable()" placeholder="Search ID, Name, or Room...">
        </div>

        <div style="background: #fff; border: 1px solid #eee; padding: 15px; border-radius: 8px;">
            <h4 style="margin: 0 0 10px 0; color: #a31d33;"><i class="fas fa-chart-pie"></i> Course Occupancy</h4>
            <div class="table-responsive">
                <table>
                    <thead><tr><th>Course</th><th>Total</th><th>Filled</th><th>Wait</th><th>Empty</th></tr></thead>
                    <tbody id="occupancy-body"></tbody>
                </table>
            </div>
        </div>

        <button class="btn" style="background-color: #28a745; margin-top: 20px;" onclick="openAddStudentModal()">+ Add Student</button>
        
        <div class="table-responsive">
            <table>
                <thead><tr><th>ID</th><th>Name</th><th>Course</th><th>Status</th><th>Room</th><th>Bed</th><th>Actions</th></tr></thead>
                <tbody id="admin-table-body"></tbody>
            </table>
        </div>
    </div>

    <div id="admin-edit-modal" class="modal">
        <div class="modal-content">
            <h3 style="color:#a31d33; margin-top:0;">Edit Student</h3>
            <div id="edit-student-name" style="margin-bottom:15px; font-weight:bold;"></div>
            <div class="input-group"><label>New Password</label><input type="text" id="edit-pass-input"></div>
            <div class="input-group"><label>Move to Room</label><input type="number" id="edit-room-input"></div>
            <div class="input-group"><label>Move to Bed</label><select id="edit-bed-input"><option value="1">1</option><option value="2">2</option><option value="3">3</option><option value="4">4</option></select></div>
            <button class="btn" style="width:100%; background:#28a745;" onclick="saveAdminChanges()">Update</button>
            <button class="btn btn-outline" style="width:100%; margin-top:10px; color:red; border-color:red;" onclick="cancelBooking()">Kick/Cancel</button>
            <button class="btn btn-outline" style="width:100%; margin-top:5px;" onclick="closeAdminModal()">Close</button>
        </div>
    </div>

    <script>
        // ... (Include your existing pullData, pushData, attemptLogin functions) ...

        async function goToAdmin() {
            await pullData();
            generateAdminRoomSelector(); // NEW: Create buttons for every room
            updateOccupancySummary();
            const tbody = document.getElementById('admin-table-body'); tbody.innerHTML = '';
            db.forEach(s => {
                const status = s.adminLocked ? 'Locked' : (s.isWaitlisted ? 'Waitlist' : (s.booked ? 'Paid' : 'Pending'));
                const r = s.booked ? s.room : (s.isWaitlisted ? s.waitRoom : '-');
                const b = s.booked ? s.bed : (s.isWaitlisted ? s.waitBed : '-');
                tbody.innerHTML += `<tr><td>${s.id}</td><td>${s.name}</td><td>${s.course}</td><td>${status}</td><td>${r}</td><td>${b}</td><td><button onclick="openAdminModal('${s.id}')">Edit</button></td></tr>`;
            });
            goToView('view-admin');
        }

        // NEW: GENERATE ALL ROOM NUMBERS FOR ADMIN TO SELECT
        function generateAdminRoomSelector() {
            const selector = document.getElementById('admin-room-selector');
            selector.innerHTML = '';
            const allRooms = [101, 102, 103, 104, 201, 202, 203, 204, 301, 302, 401, 501, 601, 701];
            allRooms.forEach(room => {
                selector.innerHTML += `<div class="room-tag" onclick="inspectRoom(${room})">${room}</div>`;
            });
        }

        // NEW: SHOW GRAPHICAL BEDS FOR ADMIN
        function inspectRoom(roomNum) {
            document.getElementById('admin-live-map').style.display = 'block';
            document.getElementById('inspect-title').innerText = "Inspecting Room " + roomNum;
            for (let i = 1; i <= 4; i++) {
                const bedEl = document.getElementById('admin-bed-' + i);
                const occupant = db.find(s => s.room == roomNum && s.bed == i && s.booked);
                const waitlisted = db.find(s => s.waitRoom == roomNum && s.waitBed == i && s.isWaitlisted);

                if (occupant) {
                    bedEl.className = "bed pos-" + i + " bed-booked";
                    bedEl.innerHTML = `<div class="pillow"></div><b>${occupant.id}</b><br>PAID`;
                } else if (waitlisted) {
                    bedEl.className = "bed pos-" + i + " bed-waiting";
                    bedEl.innerHTML = `<div class="pillow"></div><b>${waitlisted.id}</b><br>WAIT`;
                } else {
                    bedEl.className = "bed pos-" + i + " bed-available";
                    bedEl.innerHTML = `<div class="pillow"></div>EMPTY`;
                }
            }
        }

        // ... (Include existing summary and filter functions) ...
    </script>
</body>
</html>
