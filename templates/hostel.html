<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amrita Smart Hostel</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #a31d33; --bg: #f8f9fa; --text: #333; --success: #28a745; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; color: var(--text); }
        .page-container { display: none; background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 95%; max-width: 1000px; margin: 40px auto; min-height: 550px; position: relative; }
        .active-page { display: block; animation: fadeIn 0.3s ease-in; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .title { color: var(--primary); font-size: 28px; font-weight: bold; text-align: center; margin-bottom: 30px; }
        .btn { padding: 12px 25px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; background: var(--primary); color: white; transition: 0.3s; }
        .btn:hover { opacity: 0.9; transform: translateY(-1px); }
        .btn-outline { background: white; border: 2px solid var(--primary); color: var(--primary); }

        .header-buttons { position: absolute; top: 20px; right: 20px; display: flex; gap: 10px; }
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; font-weight: bold; margin-bottom: 5px; }
        .input-group input, .input-group select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }

        /* BED DESIGN */
        .floor-plan { width: 600px; height: 400px; border: 5px solid #444; margin: 20px auto; position: relative; background: #fff; border-radius: 10px; }
        .bed { position: absolute; width: 90px; height: 140px; border: 3px solid #ccc; border-radius: 10px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s; }
        .bed-available { border-color: var(--success); color: var(--success); }
        .bed-booked { background: #fcebeb; border-color: var(--primary); color: var(--primary); cursor: not-allowed; }
        .bed-selected { background: var(--primary); color: white; border-color: var(--primary); }
        .pos-1 { top: 20px; left: 20px; } .pos-2 { top: 20px; right: 20px; } .pos-3 { bottom: 20px; left: 20px; } .pos-4 { bottom: 20px; right: 20px; }

        /* ADMIN TABLE */
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { background: var(--primary); color: white; padding: 15px; text-align: left; }
        td { padding: 12px; border-bottom: 1px solid #eee; }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center; }
        .modal-content { background: white; padding: 30px; border-radius: 15px; width: 400px; }
    </style>
</head>
<body>

    <div id="view-home" class="page-container active-page" style="text-align: center;">
        <div class="title">Amrita Smart Hostel System</div>
        <div style="display: flex; gap: 20px; justify-content: center; margin-top: 50px;">
            <button class="btn" onclick="goToView('view-login')">Student Portal</button>
            <button class="btn btn-outline" onclick="goToView('view-admin-login')">Admin Portal</button>
        </div>
    </div>

    <div id="view-floor" class="page-container">
        <div class="header-buttons">
            <button class="btn btn-outline" onclick="openPassModal()">Change Password</button>
            <button class="btn" style="background:#6c757d" onclick="logout()">Logout</button>
        </div>
        <div class="title">Select Your Room (<span id="display-dept"></span>)</div>
        <div style="max-width: 300px; margin: 0 auto;" class="input-group">
            <select id="floor-select" onchange="generateRoomGrid(this.value)"></select>
        </div>
        <div id="room-grid-container" style="display: flex; gap: 15px; flex-wrap: wrap; justify-content: center; margin-top: 30px;"></div>
    </div>

    <div id="view-admin" class="page-container">
        <div class="header-buttons"><button class="btn" onclick="logout()">Logout</button></div>
        <div class="title">Admin Control Panel</div>
        <div style="display: flex; gap: 15px; margin-bottom: 20px;">
            <input type="text" id="admin-search-input" onkeyup="filterAdminTable()" placeholder="Search students..." style="flex:1; padding:12px; border-radius:8px; border:1px solid #ddd;">
            <button class="btn" style="background:var(--success)" onclick="openAddStudentModal()">+ Enroll Student</button>
        </div>
        <table>
            <thead><tr><th>ID</th><th>Name</th><th>Course</th><th>Status</th><th>Room</th></tr></thead>
            <tbody id="admin-table-body"></tbody>
        </table>
    </div>

    <div id="student-pass-modal" class="modal"><div class="modal-content"><h3>Update Password</h3><div class="input-group"><input type="password" id="new-student-pass" placeholder="New Password"></div><button class="btn" style="width:100%" onclick="saveStudentPassword()">Save</button><button class="btn btn-outline" style="width:100%; margin-top:10px;" onclick="closePassModal()">Cancel</button></div></div>
    <div id="admin-add-modal" class="modal"><div class="modal-content"><h3>Enroll Student</h3><div class="input-group"><input type="text" id="add-id-input" placeholder="Roll No"><br><br><input type="text" id="add-name-input" placeholder="Full Name"><br><br><select id="add-course-input"><option value="CSE">CSE</option><option value="AI">AI</option></select></div><button class="btn" style="width:100%" onclick="saveNewStudent()">Enroll</button></div></div>

    <script>
        let db = []; const floorAllocation = { "CSE": [1, 2], "AI": [3, 4] };
        let currentUser = null;

        async function pullData() {
            const res = await fetch('/api/sync');
            const data = await res.json();
            db = data.db || [];
        }

        async function pushData() {
            await fetch('/api/sync', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({db: db}) });
        }

        function goToView(id) {
            document.querySelectorAll('.page-container').forEach(p => p.classList.remove('active-page'));
            document.getElementById(id).classList.add('active-page');
        }

        async function attemptLogin() {
            await pullData();
            const u = db.find(s => s.id === document.getElementById('login-id').value.toUpperCase());
            if(u) { currentUser = u; setupFloorDropdown(u.course); goToView('view-floor'); }
        }

        function setupFloorDropdown(c) {
            const s = document.getElementById('floor-select'); s.innerHTML = '';
            floorAllocation[c].forEach(f => s.innerHTML += `<option value="${f}">Floor ${f}</option>`);
            generateRoomGrid(floorAllocation[c][0]);
        }

        function generateRoomGrid(f) {
            const g = document.getElementById('room-grid-container'); g.innerHTML = '';
            for(let i = (f*100)+1; i <= (f*100)+8; i++) 
                g.innerHTML += `<div style="padding:15px; border:1px solid #ddd; border-radius:10px; cursor:pointer;" onclick="alert('Room selection active')">Room ${i}</div>`;
        }

        function openPassModal() { document.getElementById('student-pass-modal').style.display='flex'; }
        function closePassModal() { document.getElementById('student-pass-modal').style.display='none'; }
        async function saveStudentPassword() {
            const newPass = document.getElementById('new-student-pass').value;
            const idx = db.findIndex(s => s.id === currentUser.id);
            if(idx !== -1 && newPass) { db[idx].pass = newPass; await pushData(); alert("Success!"); closePassModal(); }
        }

        async function attemptAdminLogin() {
            if(document.getElementById('admin-id').value === "ADMINAMRITA2000") { await pullData(); renderAdminTable(); goToView('view-admin'); }
        }

        function renderAdminTable() {
            const tbody = document.getElementById('admin-table-body'); tbody.innerHTML = '';
            db.forEach(s => tbody.innerHTML += `<tr><td>${s.id}</td><td>${s.name}</td><td>${s.course}</td><td>${s.booked ? "PAID":"-"}</td><td>${s.room}</td></tr>`);
        }

        function openAddStudentModal() { document.getElementById('admin-add-modal').style.display='flex'; }
        async function saveNewStudent() {
            db.push({ id: document.getElementById('add-id-input').value.toUpperCase(), name: document.getElementById('add-name-input').value, course: document.getElementById('add-course-input').value, pass: "1234", booked: false, room: "-", bed: "-" });
            await pushData(); renderAdminTable(); document.getElementById('admin-add-modal').style.display='none';
        }

        function logout() { location.reload(); }
        window.onload = pullData;
    </script>
</body>
</html>
