<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Hostel Accommodation System</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f5f7; margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; color: #333; }
        .page-container { display: none; background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); width: 100%; max-width: 1000px; margin: auto; box-sizing: border-box; position: relative; }
        .active-page { display: block; }
        .title { color: #a31d33; font-size: 26px; font-weight: bold; margin-bottom: 20px; margin-top: 30px; text-align: center; }
        .btn { padding: 12px 24px; font-size: 16px; border-radius: 6px; cursor: pointer; border: none; font-weight: bold; transition: 0.2s; background-color: #a31d33; color: white; margin-top: 10px; }
        .btn:hover { background-color: #8a182b; }
        .btn-outline { background-color: white; color: #a31d33; border: 2px solid #a31d33; }
        .btn-back { background: #6c757d; color: white; padding: 10px 20px; border-radius: 6px; border: none; cursor: pointer; font-weight: bold; }
        .header-buttons { position: absolute; top: 20px; right: 20px; display: flex; gap: 10px; z-index: 10; }
        .input-group { margin-bottom: 15px; text-align: left; }
        .input-group label { display: block; font-size: 14px; margin-bottom: 5px; font-weight: bold; color: #4a4a4a;}
        .input-group input, .input-group select { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 15px;}
        .error-box { color: #a31d33; background: #fcebeb; padding: 12px; border-radius: 6px; margin-bottom: 15px; display: none; font-weight: bold; text-align: center;}
        
        /* Modal Style */
        .modal { display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.6); align-items: center; justify-content: center; padding: 10px; box-sizing: border-box;}
        .modal-content { background-color: white; padding: 30px; border-radius: 10px; width: 100%; max-width: 400px; position: relative; box-shadow: 0 5px 20px rgba(0,0,0,0.2); }
        .close-btn { position: absolute; top: 15px; right: 20px; font-size: 24px; cursor: pointer; color: #777; transition: 0.2s; }
        .close-btn:hover { color: #a31d33; }

        /* Bed & Room Layout */
        .floor-plan-wrapper { width: 100%; overflow-x: auto; padding: 10px 0; text-align: center; }
        .floor-plan { width: 600px; height: 400px; border: 6px solid #4a4a4a; margin: 10px auto; position: relative; background: #fafafa; display: inline-block; text-align: left; }
        .bed { position: absolute; width: 80px; height: 130px; background: #e0e0e0; border: 2px solid #ccc; border-radius: 8px; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: 0.2s; cursor: pointer; font-size: 10px; font-weight: bold; }
        .pillow { position: absolute; top: 10px; width: 50px; height: 25px; background: white; border: 1px solid #ccc; border-radius: 4px; }
        .bed-available { border-color: #28a745; }
        .bed-selected { border-color: #28a745; background: #d4edda; border-width: 3px; }
        .bed-waiting { border-color: #fd7e14; background: #fff3cd; color: #856404; }
        .bed-booked { border-color: #dc3545; background: #f8d7da; color: #721c24; }
        .pos-1 { top: 20px; left: 20px; } .pos-2 { top: 20px; right: 20px; } .pos-3 { bottom: 20px; left: 20px; } .pos-4 { bottom: 20px; right: 20px; } 

        .room-grid { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; margin-top: 15px; }
        .room-tag { padding: 8px 12px; background: #eee; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 13px; border: 1px solid #ddd; }
        .room-tag:hover { background: #a31d33; color: white; }
        .room-card { background: white; width: 100px; padding: 15px 0; border-radius: 10px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.1); cursor: pointer; border-bottom: 4px solid #28a745; }

        .table-responsive { width: 100%; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 14px; text-align: left; min-width: 800px; }
        th, td { border: 1px solid #ddd; padding: 10px; } th { background-color: #a31d33; color: white; }
    </style>
</head>
<body>

    <div id="view-home" class="page-container active-page" style="text-align: center; max-width: 500px;">
        <div class="title"><i class="fas fa-building-columns"></i> Smart Hostel System</div>
        <button class="btn" style="width: 100%; margin-bottom: 15px;" onclick="goToView('view-login')"><i class="fas fa-user-graduate"></i> Student Portal</button>
        <button class="btn btn-outline" style="width: 100%;" onclick="goToView('view-admin-login')"><i class="fas fa-user-shield"></i> Admin Portal</button>
    </div>

    <div id="view-login" class="page-container" style="max-width: 400px;">
        <div class="title">Student Login</div>
        <div id="login-error" class="error-box">Wrong ID or Password.</div>
        <div class="input-group"><label>ID</label><input type="text" id="login-id" placeholder="AMRITA2001"></div>
        <div class="input-group"><label>Password</label><input type="password" id="login-pass"></div>
        <button class="btn" style="width: 100%;" onclick="attemptLogin()">Login</button>
        <div style="text-align: center; margin-top: 20px; border-top: 1px solid #eee; padding-top: 15px;">
            <a href="#" onclick="goToView('view-home')" style="color: #666; text-decoration: none; margin-right: 15px;"><i class="fas fa-arrow-left"></i> Back</a>
            <a href="#" onclick="goToView('view-admin-login')" style="color: #a31d33; text-decoration: none; font-weight: bold;">Admin Login</a>
        </div>
    </div>

    <div id="view-admin-login" class="page-container" style="max-width: 400px;">
        <div class="title">Admin Security</div>
        <div id="admin-login-error" class="error-box">Invalid Credentials.</div>
        <div class="input-group"><label>Admin ID</label><input type="text" id="admin-id"></div>
        <div class="input-group"><label>Password</label><input type="password" id="admin-pass"></div>
        <button class="btn" style="width: 100%;" onclick="attemptAdminLogin()">Access Panel</button>
    </div>

    <div id="view-floor" class="page-container">
        <div class="header-buttons">
            <button class="btn-back" style="background-color: #4a4a4a;" onclick="openChangePassModal()"><i class="fas fa-key"></i> Password</button>
            <button class="btn-back" onclick="logout()">Logout</button>
        </div>
        <div class="title">Select Room (<span id="display-dept"></span>)</div>
        <div id="already-booked-alert" class="error-box" style="background:#d4edda; color:#155724; display:none;">Booked: <span id="alert-room"></span></div>
        <div id="booking-selection-area">
            <div class="input-group" style="max-width: 300px; margin: 0 auto;"><select id="floor-select" onchange="generateRoomGrid(this.value)"></select></div>
            <div class="room-grid" id="room-grid-container"></div>
        </div>
    </div>

    <div id="view-room" class="page-container">
        <div class="header-buttons"><button class="btn-back" onclick="goToView('view-floor')">Back</button></div>
        <div class="title" id="room-title">Room</div>
        <div class="floor-plan-wrapper">
            <div class="floor-plan">
                <div id="bed-1" class="bed pos-1"></div><div id="bed-2" class="bed pos-2"></div>
                <div id="bed-3" class="bed pos-3"></div><div id="bed-4" class="bed pos-4"></div>
            </div>
        </div>
        <button id="btn-confirm" class="btn" style="width: 100%; opacity:0.5;" disabled onclick="goToPayment()">Proceed to Payment</button>
    </div>

    <div id="pass-change-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeChangePassModal()">&times;</span>
            <h3 style="color: #a31d33; margin-top: 0;"><i class="fas fa-key"></i> Change Password</h3>
            <div class="input-group"><label>Current Password</label><input type="password" id="old-pass-input"></div>
            <div class="input-group"><label>New Password</label><input type="password" id="new-pass-input"></div>
            <div class="input-group"><label>Confirm Password</label><input type="password" id="confirm-pass-input"></div>
            <button class="btn" style="width: 100%; background-color: #28a745;" onclick="saveNewPassword()">Update Password</button>
        </div>
    </div>

    <div id="view-admin" class="page-container">
        <div class="header-buttons"><button class="btn-back" onclick="goToView('view-home')">Logout</button></div>
        <div class="title"><i class="fas fa-user-shield"></i> Admin Control Panel</div>
        <div class="input-group"><label><i class="fas fa-search"></i> Global Search</label><input type="text" id="admin-search-input" onkeyup="filterAdminTable()" placeholder="Search ID, Name, Course..."></div>
        <button class="btn" style="background:#28a745;" onclick="openAddStudentModal()"><i class="fas fa-user-plus"></i> Add Student</button>
        <div class="table-responsive">
            <table>
                <thead><tr><th>ID</th><th>Name</th><th>Course</th><th>Pass</th><th>Status</th><th>Room</th><th>Bed</th><th>Actions</th></tr></thead>
                <tbody id="admin-table-body"></tbody>
            </table>
        </div>
    </div>

    <script>
        let db = []; let waitlistQueue = {};
        const floorAllocation = { "CSE": [1, 2], "AI": [3, 4], "EEE": [5, 6], "MBA": [7] };
        let currentUser = null, currentRoom = null, selectedBed = null, editingStudentId = null;

        async function pullData() {
            try {
                let res = await fetch('/api/sync', { cache: 'no-store' });
                let data = await res.json();
                db = data.db || []; waitlistQueue = data.queue || {};
            } catch(e) { console.error("Sync Error", e); }
        }

        async function pushData() {
            await fetch('/api/sync', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({db: db, queue: waitlistQueue}) });
        }

        function openChangePassModal() { document.getElementById('pass-change-modal').style.display = 'flex'; }
        function closeChangePassModal() { document.getElementById('pass-change-modal').style.display = 'none'; }

        async function saveNewPassword() {
            const oldPass = document.getElementById('old-pass-input').value;
            const newPass = document.getElementById('new-pass-input').value;
            const confirmPass = document.getElementById('confirm-pass-input').value;

            if (oldPass !== currentUser.pass) { alert("Incorrect current password."); return; }
            if (newPass.length < 4) { alert("New password must be at least 4 characters."); return; }
            if (newPass !== confirmPass) { alert("Passwords do not match."); return; }

            const idx = db.findIndex(s => s.id === currentUser.id);
            db[idx].pass = newPass;
            currentUser.pass = newPass;

            await pushData();
            alert("Password updated successfully!");
            closeChangePassModal();
        }

        async function attemptLogin() {
            await pullData();
            const id = document.getElementById('login-id').value.toUpperCase();
            const pass = document.getElementById('login-pass').value;
            const u = db.find(s => s.id === id && s.pass === pass);
            if(u) {
                currentUser = u;
                document.getElementById('display-dept').innerText = u.course;
                setupFloorDropdown(u.course);
                document.getElementById('already-booked-alert').style.display = u.booked ? 'block' : 'none';
                goToView('view-floor');
            } else { document.getElementById('login-error').style.display = 'block'; }
        }

        async function attemptAdminLogin() {
            if(document.getElementById('admin-id').value === "ADMINAMRITA2000") {
                await pullData(); renderAdminTable(); goToView('view-admin');
            }
        }

        function renderAdminTable() {
            const tbody = document.getElementById('admin-table-body'); tbody.innerHTML = '';
            db.forEach(s => {
                const r = s.booked ? s.room : '-';
                const b = s.booked ? s.bed : '-';
                tbody.innerHTML += `<tr><td>${s.id}</td><td>${s.name}</td><td>${s.course}</td><td>${s.pass}</td><td>${s.booked?'Paid':'Pending'}</td><td>${r}</td><td>${b}</td><td><button onclick="openAdminModal('${s.id}')">Edit</button></td></tr>`;
            });
        }

        function setupFloorDropdown(c) {
            const s = document.getElementById('floor-select'); s.innerHTML = '';
            floorAllocation[c].forEach(f => s.innerHTML += `<option value="${f}">Floor ${f}</option>`);
            generateRoomGrid(floorAllocation[c][0]);
        }

        function generateRoomGrid(f) {
            const g = document.getElementById('room-grid-container'); g.innerHTML = '';
            for(let i = (f*100)+1; i <= (f*100)+8; i++) g.innerHTML += `<div class="room-card" onclick="openGraphicalRoom(${i})"><h4>${i}</h4></div>`;
        }

        async function openGraphicalRoom(n) {
            await pullData(); currentRoom = n; document.getElementById('room-title').innerText = "Room " + n;
            for(let i=1; i<=4; i++) {
                const el = document.getElementById('bed-'+i);
                const occ = db.find(s => s.room == n && s.bed == i && s.booked);
                el.className = `bed pos-${i} ` + (occ ? 'bed-booked' : 'bed-available');
                el.innerHTML = occ ? `<div class="pillow"></div>${occ.id}` : `<div class="pillow"></div>EMPTY`;
            }
            goToView('view-room');
        }

        function filterAdminTable() {
            const q = document.getElementById('admin-search-input').value.toUpperCase();
            document.querySelectorAll('#admin-table-body tr').forEach(r => r.style.display = r.innerText.toUpperCase().includes(q) ? "" : "none");
        }

        function logout() { currentUser = null; goToView('view-home'); }
        function goToView(id) { document.querySelectorAll('.page-container').forEach(p => p.classList.remove('active-page')); document.getElementById(id).classList.add('active-page'); }
        window.onload = pullData;
    </script>
</body>
</html>
