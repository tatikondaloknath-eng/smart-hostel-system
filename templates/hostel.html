<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Hostel Accommodation System</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f5f7; margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; color: #333; }
        .page-container { display: none; background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); width: 100%; max-width: 900px; margin: auto; box-sizing: border-box; }
        .active-page { display: block; }
        .title { color: #a31d33; font-size: 26px; font-weight: bold; margin-bottom: 20px; margin-top: 30px; text-align: center; }
        .btn { padding: 12px 24px; font-size: 16px; border-radius: 6px; cursor: pointer; border: none; font-weight: bold; transition: 0.2s; background-color: #a31d33; color: white; margin-top: 10px; }
        .btn:hover { background-color: #8a182b; }
        .btn-outline { background-color: white; color: #a31d33; border: 2px solid #a31d33; }
        .btn-outline:hover { background-color: #fcebeb; }
        .btn-back { background: #6c757d; color: white; padding: 10px 20px; border-radius: 6px; border: none; cursor: pointer; font-weight: bold; }
        .header-buttons { position: absolute; top: 20px; right: 20px; display: flex; gap: 10px; z-index: 10; }
        .page-container { position: relative; } 
        .input-group { margin-bottom: 15px; text-align: left; }
        .input-group label { display: block; font-size: 14px; margin-bottom: 5px; font-weight: bold; color: #4a4a4a;}
        .input-group input, .input-group select { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 15px;}
        
        /* RESTORED BED STYLES */
        .floor-plan-wrapper { width: 100%; overflow-x: auto; padding: 10px 0; text-align: center; }
        .floor-plan { width: 600px; height: 400px; border: 6px solid #4a4a4a; margin: 10px auto; position: relative; background: #fafafa; display: inline-block; text-align: left; }
        .bed { position: absolute; width: 80px; height: 130px; background: #e0e0e0; border: 2px solid #ccc; border-radius: 8px; display: flex; justify-content: center; align-items: center; transition: 0.2s; cursor: pointer; }
        .pillow { position: absolute; top: 10px; width: 50px; height: 25px; background: white; border: 1px solid #ccc; border-radius: 4px; }
        .bed-available { border-color: #28a745; }
        .bed-selected { border-color: #28a745; background: #d4edda; border-width: 3px; }
        .bed-selected i { color: #28a745; font-size: 24px; z-index: 2; margin-top: 20px; }
        .bed-waiting { border-color: #fd7e14; background: #fff3cd; }
        .bed-locked { cursor: not-allowed; border-color: #dc3545; background: #f8d7da; }
        .bed-locked i { color: #dc3545; font-size: 24px; z-index: 2; margin-top: 20px; }
        .pos-1 { top: 20px; left: 20px; } .pos-2 { top: 20px; right: 20px; } .pos-3 { bottom: 20px; left: 20px; } .pos-4 { bottom: 20px; right: 20px; } 

        .room-grid { display: flex; gap: 15px; flex-wrap: wrap; justify-content: center; margin-top: 20px;}
        .room-card { background: white; width: 100px; padding: 15px 0; border-radius: 10px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.1); cursor: pointer; border-bottom: 4px solid #28a745; transition: 0.2s; }
        
        .table-responsive { width: 100%; overflow-x: auto; margin-top: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 14px; text-align: left; min-width: 800px; }
        th, td { border: 1px solid #ddd; padding: 10px; } th { background-color: #a31d33; color: white; }
        .modal { display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.6); align-items: center; justify-content: center; }
        .modal-content { background: white; padding: 30px; border-radius: 10px; width: 400px; position: relative; }
    </style>
</head>
<body>

    <div id="view-home" class="page-container active-page" style="text-align: center; max-width: 500px;">
        <div class="title"><i class="fas fa-building-columns"></i> Smart Hostel System</div>
        <button class="btn" style="width: 100%; margin-bottom: 15px;" onclick="goToView('view-login')">Student Portal</button>
        <button class="btn btn-outline" style="width: 100%;" onclick="goToView('view-admin-login')">Admin Portal</button>
    </div>

    <div id="view-login" class="page-container" style="max-width: 400px;">
        <div class="title">Student Login</div>
        <div class="input-group"><label>ID</label><input type="text" id="login-id"></div>
        <div class="input-group"><label>Pass</label><input type="password" id="login-pass"></div>
        <button class="btn" style="width: 100%;" onclick="attemptLogin()">Login</button>
    </div>

    <div id="view-admin-login" class="page-container" style="max-width: 400px;">
        <div class="title">Admin Login</div>
        <div class="input-group"><label>Admin ID</label><input type="text" id="admin-id"></div>
        <div class="input-group"><label>Master Pass</label><input type="password" id="admin-pass"></div>
        <button class="btn" style="width: 100%;" onclick="attemptAdminLogin()">Access</button>
    </div>

    <div id="view-floor" class="page-container">
        <div class="header-buttons"><button class="btn-back" onclick="logout()">Logout</button></div>
        <div class="title">Select Floor & Room</div>
        <div id="already-booked-alert" class="error-box" style="background:#d4edda; color:#155724; display:none;">Booked: Room <span id="alert-room"></span></div>
        <div id="waitlist-alert" class="error-box" style="background:#fff3cd; color:#856404; display:none;">Waitlist: Room <span id="wait-room"></span></div>
        <div id="booking-selection-area">
            <select id="floor-select" onchange="generateRoomGrid(this.value)"></select>
            <div class="room-grid" id="room-grid-container"></div>
        </div>
    </div>

    <div id="view-room" class="page-container">
        <div class="header-buttons"><button class="btn-back" onclick="goToView('view-floor')">Back</button></div>
        <div class="title" id="room-title">Room 101</div>
        <div class="floor-plan-wrapper">
            <div class="floor-plan">
                <div id="bed-1" class="bed pos-1"></div><div id="bed-2" class="bed pos-2"></div>
                <div id="bed-3" class="bed pos-3"></div><div id="bed-4" class="bed pos-4"></div>
            </div>
        </div>
        <button id="btn-confirm" class="btn" style="width: 100%; opacity:0.5;" disabled onclick="goToPayment()">Proceed to Payment</button>
    </div>

    <div id="view-payment" class="page-container" style="max-width: 500px;">
        <div class="header-buttons"><button class="btn-back" onclick="goToView('view-room')">Back</button></div>
        <div class="title">Secure Checkout</div>
        <div class="payment-box">
            <p>Room: <strong id="pay-room"></strong> | Bed: <strong id="pay-bed"></strong></p>
            <p>Total: <strong id="pay-amount">₹60,000</strong></p>
        </div>
        <div class="input-group"><label>Registered Mobile</label><input type="text" id="pay-mobile" maxlength="10"></div>
        <div class="input-group"><label>Cardholder Name</label><input type="text" id="card-name"></div>
        <div class="input-group"><label>Card Number</label><input type="text" id="card-num" maxlength="16"></div>
        <div style="display: flex; gap: 15px;">
            <div class="input-group" style="flex:1;"><label>Expiry</label><input type="text" placeholder="MM/YY"></div>
            <div class="input-group" style="flex:1;"><label>CVV</label><input type="password" maxlength="3"></div>
        </div>
        <button class="btn" style="width: 100%; background:#28a745;" onclick="validatePayment()">Pay Securely</button>
    </div>

    <div id="view-receipt" class="page-container" style="max-width: 500px; text-align:center;">
        <div class="receipt-card">
            <i class="fas fa-check-circle" style="font-size: 50px; color:#28a745;"></i>
            <h3>Payment Successful!</h3>
            <p>Student: <span id="receipt-name"></span></p>
            <p>Room: <span id="receipt-room"></span> | Bed: <span id="receipt-bed"></span></p>
        </div>
        <button class="btn" onclick="logout()">Done</button>
    </div>

    <div id="view-admin" class="page-container" style="max-width: 1000px;">
        <div class="header-buttons"><button class="btn-back" onclick="logoutAdmin()">Logout</button></div>
        <div class="title">SQL Admin Control Panel</div>
        <div class="input-group"><label>Search Students</label><input type="text" id="admin-search-input" onkeyup="filterAdminTable()"></div>
        <div class="table-responsive">
            <table>
                <thead><tr><th>ID</th><th>Name</th><th>Course</th><th>Status</th><th>Room</th><th>Bed</th><th>Actions</th></tr></thead>
                <tbody id="admin-table-body"></tbody>
            </table>
        </div>
    </div>

    <div id="otp-modal" class="modal"><div class="modal-content" style="text-align: center;"><h3>Verify OTP</h3><input type="text" id="otp-input" maxlength="4"><button class="btn" onclick="verifyOTP()">Confirm</button></div></div>
    <div id="admin-edit-modal" class="modal">
        <div class="modal-content">
            <h3>Edit Student</h3><div id="edit-student-name" style="font-weight:bold;"></div>
            <div class="input-group"><label>New Pass</label><input type="text" id="edit-pass-input"></div>
            <div class="input-group"><label>Room</label><input type="number" id="edit-room-input"></div>
            <div class="input-group"><label>Bed</label><select id="edit-bed-input"><option value="1">1</option><option value="2">2</option><option value="3">3</option><option value="4">4</option></select></div>
            <button class="btn" onclick="saveAdminChanges()">Save</button>
            <button class="btn btn-outline" style="color:red;" onclick="cancelBooking()">Cancel Booking</button>
        </div>
    </div>

    <script>
        let db = []; let waitlistQueue = {};
        const floorAllocation = { "CSE": [1, 2], "AI": [3, 4], "EEE": [5, 6], "MBA": [7] };
        let currentUser = null, currentRoom = null, selectedBed = null, isJoiningWaitlist = false, editingStudentId = null;

        async function pullData() {
            let res = await fetch('/api/sync');
            let data = await res.json();
            db = data.db; waitlistQueue = data.queue;
        }

        async function pushData() {
            await fetch('/api/sync', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({db: db, queue: waitlistQueue}) });
        }

        async function attemptLogin() {
            await pullData();
            const id = document.getElementById('login-id').value.toUpperCase();
            const pass = document.getElementById('login-pass').value;
            currentUser = db.find(s => s.id === id && s.pass === pass);
            if (currentUser) {
                document.getElementById('already-booked-alert').style.display = currentUser.booked ? 'block' : 'none';
                if(currentUser.booked) document.getElementById('alert-room').innerText = currentUser.room;
                setupFloorDropdown(currentUser.course);
                goToView('view-floor');
            }
        }

        function setupFloorDropdown(c) {
            const s = document.getElementById('floor-select'); s.innerHTML = '';
            floorAllocation[c].forEach(f => s.innerHTML += `<option value="${f}">Floor ${f}</option>`);
            generateRoomGrid(floorAllocation[c][0]);
        }

        function generateRoomGrid(f) {
            const g = document.getElementById('room-grid-container'); g.innerHTML = '';
            for(let i = (f*100)+1; i <= (f*100)+8; i++) {
                g.innerHTML += `<div class="room-card" onclick="openGraphicalRoom(${i})"><h4>${i}</h4></div>`;
            }
        }

        async function openGraphicalRoom(num) {
            await pullData(); currentRoom = num; document.getElementById('room-title').innerText = "Room " + num;
            const canBook = !(currentUser.booked || currentUser.isWaitlisted);
            for(let i = 1; i <= 4; i++) {
                const el = document.getElementById('bed-' + i); 
                const occ = db.find(s => s.room == num && s.bed == i && s.booked);
                if (occ && occ.adminLocked) {
                    el.className = `bed pos-${i} bed-locked`; el.innerHTML = `<div class="pillow"></div><i class="fas fa-lock"></i>`; el.onclick = null;
                } else if (occ) {
                    el.className = `bed pos-${i} bed-waiting`; el.innerHTML = `<div class="pillow"></div><i class="fas fa-clock"></i>`; el.onclick = canBook ? () => chooseBed(el, i, true) : null;
                } else {
                    el.className = `bed pos-${i} bed-available`; el.innerHTML = `<div class="pillow"></div><i class="fas fa-check" style="display:none;"></i>`; el.onclick = canBook ? () => chooseBed(el, i, false) : null;
                }
            }
            goToView('view-room');
        }

        function chooseBed(el, n, isW) {
            document.querySelectorAll('.bed').forEach(b => { b.classList.remove('bed-selected'); if(b.querySelector('.fa-check')) b.querySelector('.fa-check').style.display = 'none'; });
            el.classList.add('bed-selected'); if(el.querySelector('.fa-check')) el.querySelector('.fa-check').style.display = 'block';
            selectedBed = n; isJoiningWaitlist = isW;
            const btn = document.getElementById('btn-confirm'); btn.disabled = false; btn.style.opacity = '1';
            btn.innerText = isW ? "Join Waitlist (₹500)" : "Proceed to Payment";
        }

        function goToPayment() {
            document.getElementById('pay-room').innerText = currentRoom; document.getElementById('pay-bed').innerText = selectedBed;
            document.getElementById('pay-amount').innerText = isJoiningWaitlist ? "₹500" : "₹60,000";
            goToView('view-payment');
        }

        function validatePayment() { document.getElementById('otp-modal').style.display = 'flex'; }
        function verifyOTP() { document.getElementById('otp-modal').style.display = 'none'; processPayment(); }

        async function processPayment() {
            const idx = db.findIndex(s => s.id === currentUser.id);
            if (isJoiningWaitlist) {
                currentUser.isWaitlisted = true; currentUser.waitRoom = currentRoom; currentUser.waitBed = selectedBed;
                const key = `${currentRoom}-${selectedBed}`; if(!waitlistQueue[key]) waitlistQueue[key] = [];
                waitlistQueue[key].push(currentUser.id);
            } else { currentUser.booked = true; currentUser.room = currentRoom; currentUser.bed = selectedBed; currentUser.bookingTime = Date.now(); }
            db[idx] = currentUser; await pushData();
            document.getElementById('receipt-name').innerText = currentUser.name;
            document.getElementById('receipt-room').innerText = currentRoom;
            document.getElementById('receipt-bed').innerText = selectedBed;
            goToView('view-receipt');
        }

        async function attemptAdminLogin() { if(document.getElementById('admin-id').value === "ADMINAMRITA2000") await goToAdmin(); }
        async function goToAdmin() {
            await pullData();
            const tbody = document.getElementById('admin-table-body'); tbody.innerHTML = '';
            db.forEach(s => {
                const status = s.adminLocked ? 'Locked' : (s.isWaitlisted ? 'Waitlist' : (s.booked ? 'Paid' : 'Pending'));
                const r = s.booked ? s.room : (s.isWaitlisted ? s.waitRoom : '-');
                const b = s.booked ? s.bed : (s.isWaitlisted ? s.waitBed : '-');
                const lockBtn = s.booked ? `<button class="btn" style="background:#dc3545; padding:5px; margin-left:5px;" onclick="forceLock('${s.id}')"><i class="fas fa-lock"></i></button>` : '';
                tbody.innerHTML += `<tr><td>${s.id}</td><td>${s.name}</td><td>${s.course}</td><td>${status}</td><td>${r}</td><td>${b}</td><td><div style="display:flex;"><button class="btn" onclick="openAdminModal('${s.id}')">Edit</button>${lockBtn}</div></td></tr>`;
            });
            goToView('view-admin');
        }

        function filterAdminTable() {
            let q = document.getElementById('admin-search-input').value.toUpperCase();
            document.querySelectorAll('#admin-table-body tr').forEach(row => row.style.display = row.innerText.toUpperCase().includes(q) ? '' : 'none');
        }

        function openAdminModal(id) { editingStudentId = id; document.getElementById('admin-edit-modal').style.display = 'flex'; }
        function closeAdminModal() { document.getElementById('admin-edit-modal').style.display = 'none'; }
        async function forceLock(id) { let i = db.findIndex(s => s.id === id); db[i].adminLocked = true; await pushData(); await goToAdmin(); }
        function goToView(id) { document.querySelectorAll('.page-container').forEach(p => p.classList.remove('active-page')); document.getElementById(id).classList.add('active-page'); }
        function logout() { currentUser = null; goToView('view-home'); }
        function logoutAdmin() { goToView('view-home'); }
    </script>
</body>
</html>
